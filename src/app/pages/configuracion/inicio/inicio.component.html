<!-- inicio.component.html — grid de colecciones gestionadas -->

<div>
  <h2 class="text-sm font-bold text-gray-500 dark:text-gray-400 uppercase tracking-widest mb-4">
    Colecciones Firestore
  </h2>

  <div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-3">
    @for (col of collections; track col.name) {
      <div class="bg-white dark:bg-[#1A1A2E] border border-gray-100 dark:border-[#2D2D4A] rounded-2xl p-4 flex flex-col gap-3 hover:shadow-md transition-shadow">

        <!-- Icon + name -->
        <div class="flex items-center gap-2">
          <span class="text-2xl">{{ col.emoji }}</span>
          <span class="font-bold text-gray-900 dark:text-white text-sm leading-tight">{{ col.label }}</span>
        </div>

        <!-- Collection name badge -->
        <code class="text-xs font-mono text-gray-400 dark:text-gray-500 bg-gray-50 dark:bg-[#22223A] px-2 py-0.5 rounded-lg self-start">
          {{ col.name }}
        </code>

        <!-- Actions -->
        <div class="flex gap-2 mt-auto">
          <!-- Ver datos -->
          <a [routerLink]="['/configuracion', col.name]"
            class="flex-1 text-center py-1.5 text-xs font-bold bg-gray-900 dark:bg-[#22223A] text-white rounded-lg hover:bg-[#FF6B6B] dark:hover:bg-[#FF6B6B] transition-colors">
            Ver datos
          </a>

          <!-- Restaurar (solo si tiene mock data) -->
          @if (col.restorable) {
            <button (click)="restoreOne(col)"
              [disabled]="restoringCollection !== null"
              title="Restaurar desde mock"
              class="px-2 py-1.5 text-xs border border-gray-200 dark:border-[#2D2D4A] rounded-lg hover:bg-amber-50 dark:hover:bg-amber-900/20 hover:border-amber-300 dark:hover:border-amber-700 hover:text-amber-700 dark:hover:text-amber-400 transition-colors disabled:opacity-40 disabled:cursor-not-allowed text-gray-500 dark:text-gray-400">
              @if (restoringCollection === col.name) {
                <i-lucide [img]="loaderIcon" class="w-3.5 h-3.5 animate-spin"></i-lucide>
              } @else {
                <i-lucide [img]="refreshIcon" class="w-3.5 h-3.5"></i-lucide>
              }
            </button>
          }
        </div>

      </div>
    }
  </div>
</div>
