<!-- shared/layout/sidebar/sidebar.component.html -->
<div
  class="hidden md:flex flex-col w-64 h-screen bg-[#1A1A2E] text-white fixed left-0 top-0 z-50 border-r border-gray-800 shadow-2xl">

  <!-- Logo -->
  <div class="p-6 flex items-center justify-between border-b border-gray-800/50">
    <div class="flex items-center gap-3">
      <div
        class="w-10 h-10 bg-gradient-to-br from-[#FF6B6B] to-[#FF8E8E] rounded-xl flex items-center justify-center shadow-lg shadow-rose-900/20">
        <span class="text-xl">⚡</span>
      </div>
      <div>
        <h1 class="text-xl font-black tracking-tight">SPORTDATE</h1>
        <p class="text-[10px] text-gray-400 uppercase tracking-widest font-bold">Beta</p>
      </div>
    </div>

    <!-- Settings modal (replaces theme toggle) -->
    <app-settings-modal position="below" variant="dark" />
  </div>

  <!-- Navigation -->
  <nav class="flex-1 py-6 px-3 space-y-1 overflow-y-auto">
    @for (item of menuItems; track item.path) {
    <a [routerLink]="item.path" routerLinkActive="active-nav"
      class="w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all duration-200 text-gray-400 hover:bg-white/5 hover:text-gray-200 relative group nav-item">
      <i-lucide [img]="item.icon" class="w-5 h-5 flex-shrink-0"></i-lucide>
      <span class="font-semibold">{{ item.label }}</span>
    </a>
    }
  </nav>

  <!-- User Profile -->
  <div class="p-4 bg-[#131322] border-t border-gray-800">
    <a routerLink="/perfil"
      class="block w-full bg-[#1A1A2E] rounded-2xl p-3 border border-gray-700/50 hover:border-gray-600 transition-colors group text-left">
      <div class="flex items-center gap-3 mb-3">
        <div class="relative">
          <div
            class="w-10 h-10 rounded-full bg-gray-700 overflow-hidden border-2 border-gray-600 group-hover:border-gray-500 transition-colors">
            <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix" alt="User"
              class="w-full h-full object-cover" />
          </div>
          <div class="absolute -bottom-1 -right-1 bg-[#1A1A2E] rounded-full p-0.5">
            <div class="w-3.5 h-3.5 bg-green-500 rounded-full border-2 border-[#1A1A2E]"></div>
          </div>
        </div>
        <div class="flex-1 min-w-0">
          <h4 class="text-sm font-bold text-white truncate">Felix</h4>
          <div class="flex items-center text-xs text-orange-400 font-semibold">
            <i-lucide [img]="flameIcon" class="w-3 h-3 mr-1 fill-current"></i-lucide>
            <span>{{ userStats.streak }} días racha</span>
          </div>
        </div>
      </div>
      <app-xp-progress-bar [currentXP]="userStats.xp" [maxXP]="3000" [level]="userStats.level" size="sm"
        [showLabel]="true" />
    </a>
  </div>
</div>
