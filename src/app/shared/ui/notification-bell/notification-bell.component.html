<!-- notification-bell.component.html -->
<div class="relative">
  <!-- Bell button -->
  <button
    (click)="toggle()"
    class="relative p-2 rounded-xl text-gray-400 hover:text-white hover:bg-white/10 transition-colors">
    <i-lucide [img]="bellIcon" class="w-5 h-5"></i-lucide>
    @if (svc.unreadCount() > 0) {
      <span class="absolute -top-0.5 -right-0.5 min-w-[18px] h-[18px] px-1 bg-rose-500 text-white text-[10px] font-bold rounded-full flex items-center justify-center leading-none">
        {{ svc.unreadCount() > 9 ? '9+' : svc.unreadCount() }}
      </span>
    }
  </button>

  <!-- Dropdown -->
  @if (open()) {
    <div
      class="absolute w-72 max-w-[calc(100vw-2rem)] bg-[#1A1A2E] border border-gray-700 rounded-2xl shadow-2xl z-50 overflow-hidden"
      [class.mt-2]="direction === 'down'"
      [class.top-full]="direction === 'down'"
      [class.bottom-full]="direction === 'up'"
      [class.mb-2]="direction === 'up'"
      [class.left-0]="align === 'left'"
      [class.right-0]="align === 'right'">

      <!-- Header -->
      <div class="flex items-center justify-between px-4 py-3 border-b border-gray-700">
        <span class="text-sm font-bold text-white">Notificaciones</span>
        @if (svc.unreadCount() > 0) {
          <button (click)="markAllRead()" class="text-xs text-rose-400 hover:text-rose-300 font-semibold transition-colors">
            Marcar todas leídas
          </button>
        }
      </div>

      <!-- List -->
      <div class="max-h-72 overflow-y-auto">
        @if (svc.notifications().length === 0) {
          <div class="px-4 py-8 text-center text-gray-500 text-sm">
            Sin notificaciones
          </div>
        }
        @for (notif of svc.notifications(); track notif.id) {
          <div
            (click)="markRead(notif.id)"
            class="px-4 py-3 border-b border-gray-800 last:border-0 cursor-pointer transition-colors"
            [class.bg-white\/5]="!notif.read"
            [class.hover:bg-white\/10]="!notif.read"
            [class.hover:bg-white\/5]="notif.read">
            <div class="flex items-start gap-3">
              <div class="mt-1.5 w-2 h-2 rounded-full flex-shrink-0"
                [class.bg-rose-500]="!notif.read"
                [class.bg-transparent]="notif.read">
              </div>
              <div class="flex-1 min-w-0">
                <p class="text-sm font-semibold text-white truncate">{{ notif.title }}</p>
                <p class="text-xs text-gray-400 mt-0.5 line-clamp-2">{{ notif.message }}</p>
              </div>
            </div>
          </div>
        }
      </div>
    </div>
  }
</div>
